name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install ruff
        run: pip install ruff
      - name: Ruff check
        run: ruff check .
      - name: Ruff format check
        run: ruff format --check .

  test:
    runs-on: ubuntu-latest
    needs: lint
    services:
      postgres:
        image: postgis/postgis:16-3.4
        env:
          POSTGRES_DB: localbiz
          POSTGRES_USER: localbiz
          POSTGRES_PASSWORD: localbiz
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install dependencies
        run: pip install -r requirements.txt
      - name: Init DB
        run: PGPASSWORD=localbiz psql -h localhost -U localbiz -d localbiz -f scripts/init_db.sql
      - name: Run tests
        env:
          DATABASE_URL: postgresql://localbiz:localbiz@localhost:5432/localbiz
        run: pytest -v --tb=short || echo "No tests yet"
